<aside class="social-sidebar" aria-label="Links para redes sociais">
  <a
    class="social-sidebar__brand"
    href="#inicio"
    aria-label="Ir para o início da página"
  >
    FA
  </a>

  <nav class="social-sidebar__navigation" aria-label="Redes sociais">
    <ul class="social-sidebar__list">
      @for (socialLink of socialLinks; track socialLink.id) {
        <li class="social-sidebar__item">
          <a
            class="social-sidebar__link"
            [href]="socialLink.url"
            target="_blank"
            rel="noopener noreferrer"
            [attr.aria-label]="socialLink.ariaLabel"
            [title]="socialLink.label"
          >
            @switch (socialLink.id) {
              @case ('linkedin') {
                <svg
                  class="social-sidebar__icon social-sidebar__icon--linkedin"
                  viewBox="0 0 24 24"
                  fill="none"
                  aria-hidden="true"
                >
                  <rect x="3" y="3" width="18" height="18" rx="2.5" />
                  <path d="M8 10.5V17M8 7.5v.01M12 17v-6.5M12 13.25a3.25 3.25 0 0 1 6.5 0V17" />
                </svg>
              }
              @case ('github') {
                <svg
                  class="social-sidebar__icon social-sidebar__icon--github"
                  viewBox="0 0 24 24"
                  fill="none"
                  aria-hidden="true"
                >
                  <path d="M15 21v-3.5c.03-1-.35-1.96-1.05-2.66 3.1-.35 6.35-1.52 6.35-6.86a5.36 5.36 0 0 0-1.43-3.72A5 5 0 0 0 18.73.58S17.6.22 15 2a12.8 12.8 0 0 0-6 0C6.4.22 5.27.58 5.27.58a5 5 0 0 0-.14 3.68A5.36 5.36 0 0 0 3.7 8c0 5.33 3.25 6.5 6.35 6.86A3.63 3.63 0 0 0 9 17.5V21" />
                  <path d="M9 18c-3 .92-3-1.5-4.2-2" />
                </svg>
              }
              @case ('instagram') {
                <svg
                  class="social-sidebar__icon social-sidebar__icon--instagram"
                  viewBox="0 0 24 24"
                  fill="none"
                  aria-hidden="true"
                >
                  <defs>
                    <linearGradient id="instagram-outline" x1="4" y1="20" x2="20" y2="4" gradientUnits="userSpaceOnUse">
                      <stop stop-color="#f59e0b" />
                      <stop offset="0.5" stop-color="#ec4899" />
                      <stop offset="1" stop-color="#8b5cf6" />
                    </linearGradient>
                  </defs>
                  <rect x="3" y="3" width="18" height="18" rx="5" />
                  <circle cx="12" cy="12" r="4" />
                  <circle cx="17.4" cy="6.7" r="0.7" />
                </svg>
              }
            }
          </a>
        </li>
      }
    </ul>
  </nav>
</aside>
